
{% extends 'reservas/base.html' %} <!--Se hereda la estructura del archivo base.html, para no comenzar desde cero-->
{% block contenido %}
<div class="card p-4 mx-auto text-center" style="max-width: 400px;">
    <h4 class="text-danger">¿Eliminar reserva de {{ reserva.pasajero_nombre }}?</h4> <!--Confirmación si se desea eliminar o no-->
    <form method="POST" class="mt-3">
        {% csrf_token %}
        <a href="{% url 'lista_vuelos' %}" class="btn btn-secondary">No, cancelar</a>
        <button type="submit" class="btn btn-danger">Sí, borrar</button>
    </form>
</div>
{% endblock %}
